<!doctype html>
<html>
<head>
<title>(￣y▽￣)╭ Ohohoho.....</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f8f8; color: #222; font-size: 13px; }
  .app { max-width: 900px; margin: 0 auto; padding: 20px; }
  h1 { font-size: 16px; font-weight: 600; margin-bottom: 20px; color: #111; }
  .tabs { display: flex; gap: 0; border-bottom: 1px solid #ddd; margin-bottom: 20px; }
  .tab { padding: 8px 20px; cursor: pointer; border: 1px solid transparent; border-bottom: none; margin-bottom: -1px; color: #666; font-size: 13px; background: transparent; }
  .tab.active { background: #fff; border-color: #ddd; color: #111; font-weight: 600; border-radius: 4px 4px 0 0; }
  .panel { display: none; }
  .panel.active { display: block; }
  .controls { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .controls h2 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin-bottom: 12px; }
  .color-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .color-row label { width: 130px; font-size: 12px; color: #555; flex-shrink: 0; }
  .color-row input[type=color] { width: 36px; height: 28px; border: 1px solid #ddd; border-radius: 4px; padding: 2px; cursor: pointer; background: #fff; }
  .color-row span { font-size: 11px; color: #999; font-family: monospace; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .preview-wrap { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px; margin-bottom: 16px; overflow: auto; }
  .preview-wrap h2 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin-bottom: 12px; }
  .preview-inner { transform-origin: top left; }
  .copy-btn { display: block; width: 100%; padding: 10px; background: #111; color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; margin-top: 8px; }
  .copy-btn:hover { background: #333; }
  .copy-btn.copied { background: #2a7a4a; }
  .divider { border: none; border-top: 1px solid #eee; margin: 14px 0; }
  .hint { font-size: 11px; color: #aaa; margin-bottom: 14px; }
</style>
</head>
<body>
<div class="app">
  <h1>🎨 색상 테마 에디터</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('dark')">다크 (디자인 1)</button>

  </div>

  <div id="panel-dark" class="panel active">

      <div class="grid2">
        <div class="color-row"><label>기본 포인트 색상</label><input type="color" id="d-accent" value="#6bbdee" oninput="updateDark()"><span id="d-accent-hex">#6bbdee</span></div>
        <div class="color-row"><label>배경 기본색</label><input type="color" id="d-bg" value="#0d1b2a" oninput="updateDark()"><span id="d-bg-hex">#0d1b2a</span></div>
        <div class="color-row"><label>텍스트 색상</label><input type="color" id="d-text" value="#a8cadf" oninput="updateDark()"><span id="d-text-hex">#a8cadf</span></div>
        <div class="color-row"><label>보조 텍스트</label><input type="color" id="d-subtext" value="#4a7fa8" oninput="updateDark()"><span id="d-subtext-hex">#4a7fa8</span></div>
      </div>
    </div>
    <div class="preview-wrap">
      <h2>미리보기</h2>
      <div id="preview-dark"></div>
    </div>
    <button class="copy-btn" id="copy-dark" onclick="copyCode('dark')">📋 코드 복사</button>
  </div>

  <div id="panel-light" class="panel">
    <div class="controls">
      <h2>주요 색상 선택</h2>
      <p class="hint">주요 색상을 바꾸면 관련 색상이 자동으로 조화롭게 변경됩니다.</p>
      <div class="grid2">
        <div class="color-row"><label>기본 포인트 색상</label><input type="color" id="l-accent" value="#556b2f" oninput="updateLight()"><span id="l-accent-hex">#556b2f</span></div>
        <div class="color-row"><label>배경 기본색</label><input type="color" id="l-bg" value="#fdf5e6" oninput="updateLight()"><span id="l-bg-hex">#fdf5e6</span></div>
        <div class="color-row"><label>테두리/구분선 색상</label><input type="color" id="l-border" value="#d4b483" oninput="updateLight()"><span id="l-border-hex">#d4b483</span></div>
        <div class="color-row"><label>텍스트 색상</label><input type="color" id="l-text" value="#4a3728" oninput="updateLight()"><span id="l-text-hex">#4a3728</span></div>
      </div>
    </div>
    <div class="preview-wrap">
      <h2>미리보기</h2>
      <div id="preview-light"></div>
    </div>
    <button class="copy-btn" id="copy-light" onclick="copyCode('light')">📋 코드 복사</button>
  </div>
</div>

<script>
function hexToRgb(h){let r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);return r?{r:parseInt(r[1],16),g:parseInt(r[2],16),b:parseInt(r[3],16)}:null;}
function blend(h1,h2,t){let a=hexToRgb(h1),b=hexToRgb(h2);if(!a||!b)return h1;let r=Math.round(a.r+(b.r-a.r)*t),g=Math.round(a.g+(b.g-a.g)*t),bl=Math.round(a.b+(b.b-a.b)*t);return '#'+[r,g,bl].map(x=>x.toString(16).padStart(2,'0')).join('');}
function lighten(h,t){return blend(h,'#ffffff',t);}
function darken(h,t){return blend(h,'#000000',t);}
function adjustAlpha(hex,a){let r=hexToRgb(hex);if(!r)return hex;return `rgba(${r.r},${r.g},${r.b},${a})`;}

function getDarkPalette(accent,bg,text,subtext){
  return {
    bg0: darken(bg,0.15),
    bg1: bg,
    bg2: lighten(bg,0.08),
    bg3: lighten(bg,0.03),
    bg4: lighten(bg,0.05),
    border: lighten(bg,0.15),
    accent: accent,
    accentDim: blend(accent,bg,0.5),
    text: text,
    textDim: blend(text,bg,0.4),
    subtext: subtext,
    subtextDim: blend(subtext,bg,0.4),
  };
}

function getLightPalette(accent,bg,border,text){
  return {
    bg: bg,
    bgLight: lighten(bg,0.4),
    bgCard1: lighten(bg,0.5),
    bgCard2: lighten(bg,0.6),
    bgSummary: blend(bg,'#fffde7',0.5),
    border: border,
    borderDim: adjustAlpha(border,0.4),
    accent: accent,
    accentDim: blend(accent,'#8fad5f',0.4),
    text: text,
    textDim: blend(text,bg,0.3),
    subtextBold: blend(accent,text,0.5),
  };
}

function buildDarkHTML(p){

function updateDark(){
  const accent = document.getElementById('d-accent').value;
  const bg = document.getElementById('d-bg').value;
  const text = document.getElementById('d-text').value;
  const subtext = document.getElementById('d-subtext').value;
  document.getElementById('d-accent-hex').textContent = accent;
  document.getElementById('d-bg-hex').textContent = bg;
  document.getElementById('d-text-hex').textContent = text;
  document.getElementById('d-subtext-hex').textContent = subtext;
  const p = getDarkPalette(accent,bg,text,subtext);
  document.getElementById('preview-dark').innerHTML = buildDarkHTML(p);
}

function updateLight(){
  const accent = document.getElementById('l-accent').value;
  const bg = document.getElementById('l-bg').value;
  const border = document.getElementById('l-border').value;
  const text = document.getElementById('l-text').value;
  document.getElementById('l-accent-hex').textContent = accent;
  document.getElementById('l-bg-hex').textContent = bg;
  document.getElementById('l-border-hex').textContent = border;
  document.getElementById('l-text-hex').textContent = text;
  const p = getLightPalette(accent,bg,border,text);
  document.getElementById('preview-light').innerHTML = buildLightHTML(p);
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelector(`[onclick="switchTab('${name}')"]`).classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}

function copyCode(type){
  let code;
  if(type==='dark'){
    const accent=document.getElementById('d-accent').value;
    const bg=document.getElementById('d-bg').value;
    const text=document.getElementById('d-text').value;
    const subtext=document.getElementById('d-subtext').value;
    const p=getDarkPalette(accent,bg,text,subtext);
    code=buildDarkHTML(p);
  } else {
    const accent=document.getElementById('l-accent').value;
    const bg=document.getElementById('l-bg').value;
    const border=document.getElementById('l-border').value;
    const text=document.getElementById('l-text').value;
    const p=getLightPalette(accent,bg,border,text);
    code=buildLightHTML(p);
  }
  navigator.clipboard.writeText(code).then(()=>{
    const btn=document.getElementById('copy-'+type);
    btn.textContent='✅ 복사됨!';
    btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='📋 코드 복사';btn.classList.remove('copied');},2000);
  });
}

updateDark();
updateLight();
</script>
</body>
</html>
